version: "1.0"

# --------------------------------------------
# Judge configuration
# --------------------------------------------
judge:
  provider: openai
  model: anthropic/claude-opus-4.6
  temperature: 0.0
  max_tokens: 4096

  bias_mitigation:
    randomize_order: true
    chain_of_thought: true
    structured_output: true
    multiple_judges: false
    judge_count: 3
    aggregation: median

  cost_controls:
    max_judge_calls_per_scenario: 5
    cache_identical_judgments: true

# --------------------------------------------
# Rubric definitions
# --------------------------------------------
rubrics:
  - id: product
    name: "Core Product"
    description: "Evaluates core product assistant sessions using the product-intelligence judge rubrics"
    pass_threshold: 0.70

    dimensions:
      - id: quality
        name: "User-Recognized Value"
        weight: 0.20
        scale:
          type: likert
          points: 5
          labels:
            1: "Poor Performance - user frustrated or dissatisfied; interaction slower than manual work; output unusable; no useful capability discovery; negative ROI"
            2: "Below Expectations - task may complete but user is dissatisfied or sceptical; marginal time savings; output needs major corrections; little capability discovery"
            3: "Acceptable - neutral task completion; moderate 25-50% time savings; output usable with minor fixes; user discovers a few useful capabilities"
            4: "Good Performance - user gives positive signals; significant 50-75% time savings; high-quality output with minimal polish; clear value above expectations"
            5: "Excellent Performance - user shows delight or surprise; 75%+ time savings or previously impossible task enabled; production-ready output; creates a wow moment"
        judge_prompt: |
          Evaluation Context
          The AI assistant (called "CoPilot") should deliver meaningful value that users recognise and appreciate. Value ranges from transformative ("I can't believe you can do this for me") to detrimental ("this is useless, what's the point").

          Key value dimensions include:
          - Time saved compared to manual processes
          - Quality of output produced
          - Problems solved or prevented
          - Capabilities revealed that expand what users thought possible
          - Overall user satisfaction and delight

          What You Are Evaluating
          You will be shown a conversation between a user and the AI assistant. Evaluate the value delivered from the user's perspective.

          Evaluation Criteria
          Score the conversation from 1-5 based on the following rubric:

          Score 1 - Poor Performance
          - User expresses frustration, abandons task, or explicitly states dissatisfaction
          - Interaction is slower than doing the task manually would have been
          - Output is unusable and requires complete redo
          - User gains no insight into platform capabilities
          - Negative ROI on user's time investment
          - User would actively discourage others from using the CoPilot

          Score 2 - Below Expectations
          - User completes task but expresses dissatisfaction or scepticism
          - Marginal time savings that don't clearly justify the interaction
          - Output needs major corrections before being usable
          - User learns minimal new capabilities
          - Questionable whether the interaction was worthwhile
          - User unlikely to return for similar tasks

          Score 3 - Acceptable
          - Neutral outcome; task completed without notable positive or negative reaction
          - Moderate time savings (25-50% faster than manual)
          - Output acceptable with minor fixes or polish needed
          - User discovers 2-3 useful features or capabilities
          - Reasonable value delivered; meets basic expectations
          - User would use again but isn't particularly impressed

          Score 4 - Good Performance
          - User acknowledges helpfulness with positive signals
          - Significant time savings (50-75% faster than manual)
          - Output high quality with minimal polish needed
          - User discovers multiple powerful capabilities they didn't know existed
          - Clear value delivered that exceeds expectations
          - User would recommend to colleagues

          Score 5 - Excellent Performance
          - User expresses delight, surprise, or amazement at capability
          - Massive time savings (75%+ faster) OR enables previously impossible tasks
          - Output exceeds expectations; production-ready without modification
          - Transformative revelation that changes how user thinks about their workflow
          - User explicitly states high value or asks how to do more
          - Creates genuine "wow" moment; user becomes an advocate

          Evaluation Instructions

          1. Track explicit value signals from the user (satisfaction expressions, complaints, follow-up enthusiasm).
          2. Estimate time/effort saved compared to reasonable manual alternatives.
          3. Assess output quality relative to what the user needed.
          4. Note any capability discoveries or "aha moments" during the interaction.
          5. Consider the holistic experience: Did the user leave better off than when they arrived?

      - id: friction
        name: "Friction Level"
        weight: 0.10
        score_direction: lower_is_better
        scale:
          type: likert
          points: 5
          labels:
            1: "Frictionless - useful response immediately; no confusion, errors, retries, or misunderstandings; smooth path from request to resolution"
            2: "Minor Friction - one small hiccup, clarification, rephrase, delay, or extra step; assistant recovered quickly; user never seemed frustrated"
            3: "Moderate Friction - multiple retries or rephrases; some confusion about capability or instructions; error worked around; noticeable extra effort"
            4: "High Friction - multiple errors, misunderstandings, or dead ends; user visibly struggled; significant back-and-forth without clear progress"
            5: "Severely Blocked - user could not accomplish the goal; repeated failures with no recovery; abandonment or fundamental communication/capability breakdown"
        judge_prompt: |
          Evaluate the FRICTION level in this conversation.

          SCORING RUBRIC (NOTE: 1 = best, 5 = worst for friction):

          Score 1 — Frictionless
          - User stated their need and got a useful response immediately
          - No confusion about how to proceed at any point
          - No errors, retries, or misunderstandings
          - Conversation flowed naturally from request to resolution

          Score 2 — Minor Friction
          - One small hiccup that was quickly resolved (e.g., a minor clarification needed)
          - User briefly had to rephrase but assistant recovered well
          - Slight delay or extra step but overall smooth experience
          - User never seemed frustrated or lost

          Score 3 — Moderate Friction
          - User had to retry or rephrase their request multiple times
          - Some confusion about what the assistant could do or how to ask
          - An error occurred but was eventually worked around
          - Noticeable extra effort required but goal was still reachable

          Score 4 — High Friction
          - Multiple errors, misunderstandings, or dead ends
          - User visibly struggled to get the assistant to understand
          - Significant back-and-forth without clear progress
          - User had to substantially change their approach mid-conversation

          Score 5 — Severely Blocked
          - User was unable to accomplish their goal due to friction
          - Repeated failures with no successful recovery
          - User appeared to give up or abandon the conversation
          - Fundamental breakdown in communication or capability

          CRITICAL RULES:
          - Focus on the USER's experience, not the assistant's intent
          - Count the number of retries, rephrases, and error recoveries
          - A long conversation is NOT automatically high friction — it could be a complex but smooth task
          - Look for signals: "that's not what I meant", repeated similar prompts, abandonment

      - id: sentiment
        name: "User Sentiment"
        weight: 0.10
        scale:
          type: likert
          points: 5
          labels:
            1: "Negative / Frustrated - user clearly dissatisfied, angry, disappointed, dismissive, abandoning, or explicitly says the answer is wrong or unhelpful"
            2: "Mildly Negative / Impatient - user is curt, impatient, subtly dissatisfied, declining in engagement, or has to correct with phrases like no, I meant"
            3: "Neutral / Transactional - user is matter-of-fact with no strong emotional signal; functional exchange; no clear positive or negative sentiment"
            4: "Mildly Positive / Engaged - user shows interest, mild satisfaction, thanks, follow-up curiosity, or willingness to continue exploring"
            5: "Clearly Positive / Delighted - user expresses explicit enthusiasm, strong satisfaction, excitement about capabilities, high engagement, or intent to reuse/recommend"
        judge_prompt: |
          Evaluate the USER SENTIMENT in this conversation.

          SCORING RUBRIC:

          Score 1 — Negative / Frustrated
          - User expressed clear dissatisfaction, frustration, or anger
          - Tone shifted noticeably negative during the conversation
          - User made complaints or expressed disappointment
          - Signs of giving up: short dismissive replies, abandonment
          - Explicit negative feedback ("this isn't helpful", "that's wrong")

          Score 2 — Mildly Negative / Impatient
          - User showed subtle signs of impatience or mild dissatisfaction
          - Tone became slightly curt or clipped over the conversation
          - User didn't complain directly but showed declining engagement
          - Polite but with undertones of frustration ("let me try again", "no, I meant...")

          Score 3 — Neutral / Transactional
          - User was matter-of-fact, neither positive nor negative
          - Purely functional interaction with no emotional signals
          - User got what they needed (or didn't) without strong reaction
          - Professional, brief exchanges with no sentiment indicators

          Score 4 — Mildly Positive / Engaged
          - User showed signs of interest or mild satisfaction
          - Engaged with follow-up questions showing curiosity
          - Polite acknowledgments ("thanks", "ok great")
          - Willingness to continue the conversation and explore further

          Score 5 — Clearly Positive / Delighted
          - User expressed explicit satisfaction or enthusiasm
          - Strong positive signals ("this is exactly what I needed!", "amazing")
          - User showed excitement about capabilities discovered
          - High engagement: asked follow-up questions, explored further
          - Expressed intent to use the tool again or recommended it

          CRITICAL RULES:
          - Analyze the USER's messages only, not the assistant's tone
          - Short conversations with no sentiment signals default to Score 3 (neutral)
          - A single "thanks" at the end is Score 4 at most, not Score 5
          - Look at the trajectory: did sentiment improve or decline over the conversation?
          - Distinguish between politeness (neutral) and genuine enthusiasm (positive)

      - id: goal_completion
        name: "Goal Completion"
        weight: 0.25
        scale:
          type: likert
          points: 5
          labels:
            1: "Not Accomplished - user's goal not done, wrong, incomplete, not attempted, misunderstood, or no meaningful progress toward the objective"
            2: "Minimal Progress - small start but major portions remain undone; assistant stalled or went off-track; user would need to redo most work"
            3: "Partial Completion - core task partly done but important details or follow-up steps missing; user can finish but still has meaningful work"
            4: "Largely Accomplished - substance of goal delivered with only minor gaps, polish, edge cases, or refinements left for the user"
            5: "Fully Accomplished - request completely and correctly fulfilled; final artifact/output delivered; no remaining work required from the user"
        judge_prompt: |
          Evaluate the GOAL COMPLETION of this conversation.

          Your task is to determine whether the AI assistant (CoPilot) actually accomplished what the user asked for. This is distinct from whether the user felt good about it (that's sentiment) or whether the process was smooth (that's friction). Focus purely on objective task achievement.

          SCORING RUBRIC:

          Score 1 - Not Accomplished
          - User's goal was not accomplished at all
          - Task left incomplete, wrong, or not even attempted
          - The agent failed to understand what was being asked, or understood but could not execute
          - No meaningful progress toward the user's objective

          Score 2 - Minimal Progress
          - Minimal progress toward the user's goal
          - Significant portions of the task remain undone
          - Agent may have started in the right direction but stalled or went off-track
          - User would need to redo most of the work themselves

          Score 3 - Partial Completion
          - Core task done but important details or follow-up steps are missing
          - The user got partway there but the job isn't finished
          - Agent addressed the main request but left gaps that matter
          - User could finish from here but still has meaningful work to do

          Score 4 - Largely Accomplished
          - Goal largely accomplished with only minor gaps
          - User could easily finish the remaining small details themselves
          - Agent delivered the substance of what was asked
          - Only polish, edge cases, or minor refinements remain

          Score 5 - Fully Accomplished
          - User's request completely and correctly fulfilled
          - Nothing left undone; the task is finished
          - Agent understood the goal, executed it, and delivered the result
          - User has no remaining work to do on this task
          - Assistant's final turn delivered the requested artifact/output; user's lack of a reply after delivery is normal and does not reduce the score

          EVALUATION INSTRUCTIONS:

          1. First, identify the user's goal. What were they trying to accomplish? If unclear, note that.
          2. Then, trace through the conversation to see what was actually delivered.
          3. Compare: does the delivered output match the requested output?
          4. Score based on the gap between what was asked and what was done.

          IMPORTANT DISTINCTIONS:
          - A user can be satisfied (high sentiment) with a partially completed task (low goal completion) — score the completion, not the satisfaction.
          - A user can be frustrated (low sentiment) with a correctly completed task (high goal completion) — score the completion, not the frustration.
          - If the user's goal was ambiguous and the agent didn't clarify, that counts against completion.
          - If the user changed their goal mid-conversation, evaluate against the final goal.

          CRITICAL: USER SILENCE AFTER DELIVERY IS COMPLETION, NOT ABANDONMENT

          In autopilot/long-running sessions, the conversation often ends with the assistant delivering the requested artifact (file, report, analysis, code change, docx, etc.). If the last assistant turn delivered what was asked for and the user simply did not reply afterward, this is a SUCCESSFUL COMPLETION.

          - Do NOT treat "user did not send a closing message" as user_disengagement.
          - Do NOT lower the score because there is no explicit user confirmation or "thanks".
          - user_disengagement applies ONLY when the user stopped responding MID-TASK, before the assistant had delivered the requested output — e.g. the user asked a clarifying question, the assistant replied, and the user never returned to move the task forward.
          - If the assistant's final turn delivered the requested work (shipped a file, produced the answer, completed the operation), score based on the quality and completeness of that delivery, not on whether the user said anything after.

          ERRORS ONLY MATTER IF THEY BLOCKED COMPLETION

          Tool failures, command errors, retries, exceptions, and other error messages visible in the trace should only count against the score if they actually prevented the assistant from completing the user's task. If the assistant encountered errors but recovered, retried, worked around them, or otherwise still delivered the requested output, do NOT lower the score and do NOT assign `error_or_failure` as an abandonment reason. `error_or_failure` applies ONLY when a technical error, tool failure, or crash was the reason the task was not completed.

      - id: tool_use
        name: "Tool Use Appropriateness"
        weight: 0.15
        scale:
          type: likert
          points: 5
          labels:
            1: "Poor Tool Use - wrong or missing needed tools; incorrect or irrelevant arguments; tool results ignored/misused; unnecessary tools used for direct answers"
            2: "Below Average Tool Use - partly correct tools but missing critical calls or wasting calls; vague/wrong arguments; key result information missed"
            3: "Acceptable Tool Use - generally appropriate tools; minor inefficiency, extra call, imprecise argument, or missed optimization; results mostly used correctly"
            4: "Good Tool Use - good tool selection and logical order; specific well-formed arguments; minimal waste; results synthesized effectively"
            5: "Excellent Tool Use - optimal strategy with right tools in right order; precise arguments; every call has purpose; excellent synthesis of results"
        judge_prompt: |
          Evaluate the TOOL USE APPROPRIATENESS in this conversation.

          Your task is to assess whether the AI assistant selected the right tools, called them in the right order, with well-formed arguments, and used the results effectively. This is distinct from whether the user was satisfied (that's quality) or whether the process was smooth (that's friction). Focus on the agent's decision-making about tool usage.

          Look for "Tool Call Request" and "Tool Call Response" lines in the conversation to identify tool usage.

          SCORING RUBRIC:

          Score 1 - Poor Tool Use
          - Wrong tools selected for the task (e.g., used find_block when user wanted find_agent)
          - Tools called with incorrect or irrelevant arguments
          - Tool results ignored or misused in the response
          - Tools called when a direct answer would have sufficed, or tools not called when they were clearly needed

          Score 2 - Below Average Tool Use
          - Partially correct tool selection but significant unnecessary calls or missing critical tools
          - Arguments poorly formed (e.g., vague search queries, wrong parameter names)
          - Some tool results used but key information from responses was missed
          - Inefficient ordering that caused wasted calls

          Score 3 - Acceptable Tool Use
          - Generally appropriate tool selection for the task
          - Minor inefficiencies: one extra call, slightly imprecise arguments, or a missed optimisation
          - Tool results mostly used correctly in the response
          - Reasonable approach even if not optimal

          Score 4 - Good Tool Use
          - Good tool selection and logical ordering
          - Arguments well-formed with appropriate specificity
          - Minimal waste — no unnecessary calls
          - Tool results used effectively to compose the response

          Score 5 - Excellent Tool Use
          - Optimal tool strategy: right tools in the right order
          - Precise, well-crafted arguments that maximise result quality
          - No unnecessary calls; every tool invocation serves a clear purpose
          - Excellent synthesis of tool results into a coherent, accurate response

          EVALUATION INSTRUCTIONS:

          1. Identify what tools were called (look for Tool Call Request lines).
          2. Assess: were these the right tools for what the user asked?
          3. Check the arguments: were they well-formed and specific?
          4. Check the ordering: did the sequence make logical sense?
          5. Check synthesis: did the agent use the tool results accurately in its response?
          6. Look for missing tool calls: should the agent have called a tool it didn't?
          7. Look for unnecessary calls: did the agent call tools it didn't need to?

          SPECIAL CASES:
          - If there are NO tool calls in the conversation, consider whether tools were needed. If the user asked a general question that didn't require tools, score 3-5. If tools were clearly needed but not called, score 1-2.
          - If tools returned errors, evaluate whether the agent's recovery strategy was appropriate.

      - id: groundedness
        name: "Groundedness"
        weight: 0.20
        scale:
          type: likert
          points: 5
          labels:
            1: "Significant Hallucination - multiple fabricated or contradicted claims; invented results, capabilities, or details; user would be seriously misled"
            2: "Notably Ungrounded - unsupported claims mixed with accurate ones; embellishes or misrepresents tool results; minor hallucinations could mislead"
            3: "Mostly Grounded - mostly accurate to tools/context; occasional vague or slightly inaccurate characterization; no outright fabrication but loose details"
            4: "Well Grounded - claims consistently supported by evidence; accurate tool-output representation; only rare harmless imprecision; hedges uncertainty"
            5: "Fully Grounded - every claim traceable to tool outputs or context; no hallucination; precise evidence representation; explicitly states limits when uncertain"
        judge_prompt: |
          Evaluate the GROUNDEDNESS of the AI assistant's responses in this conversation.

          Your task is to determine whether the assistant's statements are faithfully grounded in the conversation evidence — tool outputs, user messages, and prior context. This is distinct from whether the user was satisfied (quality), whether the goal was completed (goal completion), or whether the process was smooth (friction). Focus purely on factual fidelity.

          WHAT TO LOOK FOR:
          - Does the agent accurately represent what tool outputs returned?
          - Does the agent fabricate information not present in the conversation?
          - Does the agent contradict evidence from tool responses?
          - Does the agent claim capabilities or results that aren't supported?
          - Does the agent hallucinate details when tools returned empty or error results?

          SCORING RUBRIC:

          Score 1 - Significant Hallucination
          - Multiple fabricated claims with no basis in the conversation
          - Agent asserts things directly contradicted by tool outputs
          - Agent invents results, capabilities, or details wholesale
          - User would be seriously misled by the agent's response

          Score 2 - Notably Ungrounded
          - Some unsupported claims mixed with accurate information
          - Agent embellishes or misrepresents tool results (e.g., "I found 3 great options" when tool returned 5 unrelated results)
          - Minor hallucinations that could mislead the user
          - Agent overpromises capabilities not evidenced in the conversation

          Score 3 - Mostly Grounded
          - Mostly accurate representation of tool outputs and conversation context
          - Occasional vague or slightly inaccurate characterisations
          - Minor imprecisions that are unlikely to mislead (e.g., paraphrasing that loses nuance)
          - No outright fabrication but some looseness with details

          Score 4 - Well Grounded
          - Agent's claims consistently supported by conversation evidence
          - Accurate representation of tool outputs
          - Rare minor imprecisions that don't affect meaning
          - Appropriate hedging when information is uncertain or incomplete

          Score 5 - Fully Grounded
          - Every claim traceable to tool outputs or conversation context
          - No hallucination whatsoever
          - Precise and faithful representation of all evidence
          - When uncertain, agent explicitly states the limits of available information

          EVALUATION INSTRUCTIONS:

          1. Identify the agent's factual claims in its CoPilot messages.
          2. For each claim, check: is there supporting evidence in the Tool Call Responses or user messages?
          3. Look for contradictions between what tools returned and what the agent said.
          4. Pay special attention to numbers, names, and specific details — these are where hallucination is most common.
          5. Check if the agent made claims when tools returned errors or empty results.

          SPECIAL CASES:
          - General knowledge statements (e.g., "automation can help with that") don't require tool evidence.
          - If the conversation has no tool calls, evaluate whether the agent's claims about the platform's capabilities are reasonable vs. fabricated.
          - Hedged language ("I think", "it's possible") is better than false certainty.

    scoring_overrides:
      auto_fail_conditions:
        - dimension: goal_completion
          below: 2
        - dimension: groundedness
          below: 2
      auto_pass_conditions: []

    meta_prompt: |
      You are evaluating product assistant conversations using the exact metric
      rubrics from /Users/swifty/work/product-intelligence/backend/src/judges/.

      Source judge system prompts:
      - quality: You are an expert evaluator assessing the tangible value an AI assistant delivers to users during interactions with a business automation platform.
      - friction: You are a UX friction analyst specializing in AI assistant interactions. You evaluate how smoothly users were able to accomplish their goals when interacting with the AI assistant "Otto" on the AutoGPT platform.
      - sentiment: You are a sentiment analyst specializing in AI assistant interactions. You evaluate the user's emotional response and satisfaction level during their conversation with the AI assistant "Otto" on the AutoGPT platform.
      - goal_completion: You are an expert evaluator assessing whether an AI assistant objectively accomplished the user's goal during an interaction with a business automation platform.
      - tool_use: You are an expert evaluator assessing the quality of an AI assistant's tool selection and usage during interactions with a business automation platform.
      - groundedness: You are an expert evaluator assessing the factual fidelity of an AI assistant's responses during interactions with a business automation platform.

      IMPORTANT INSTRUCTIONS:
      - Evaluate based ONLY on what is in the conversation transcript.
      - Score each dimension independently using its dimension-specific rubric.
      - Preserve the friction rubric direction exactly: 1 is best and 5 is worst.
      - Provide specific evidence from the conversation for each score.
      - The source metric judges return JSON with "score" and "reasoning"; this
        AgentProbe rubric should return the standard dimension-scored JSON.

      Output your evaluation as JSON:
      {
        "dimensions": {
          "<dimension_id>": {
            "reasoning": "Step-by-step analysis with evidence...",
            "evidence": ["quote or observation 1", "quote or observation 2"],
            "score": <integer>
          }
        },
        "overall_notes": "Brief summary of key strengths and failures",
        "pass": <boolean>
      }

  # -- MULTI-SESSION MEMORY RUBRIC -----------
  - id: multi-session-memory
    name: "Multi-Session Memory"
    description: "Evaluates memory persistence, recall accuracy, and context separation across session boundaries"
    pass_threshold: 0.65

    meta_prompt: |
      You are judging an AI agent's memory system across multiple sessions.
      The scenario seeded facts in an earlier session, then probed recall in a later session
      after a full agent restart (fresh_agent reset — no context window, only persistent memory).

      Expected behavior: {{ expectations.expected_behavior }}
      {% if expectations.tester_note %}Tester note: {{ expectations.tester_note }}{% endif %}
      {% if expectations.failure_modes %}
      Known failure modes to watch for:
      {% for fm in expectations.failure_modes %}- {{ fm.name }}: {{ fm.description }}
      {% endfor %}{% endif %}

    judge: &memory_judge
      provider: openai
      model: anthropic/claude-opus-4.6
      temperature: 0.0
      max_tokens: 4096

    dimensions:
      - &dim_retention_accuracy
        id: retention_accuracy
        name: "Retention Accuracy"
        weight: 0.35
        scale: &scale_retention_accuracy
          type: likert
          points: 5
          labels:
            1: "No recall — agent forgot all seeded facts"
            2: "Minimal — recalled one fact or vague fragments"
            3: "Partial — recalled some facts but missed key ones"
            4: "Good — recalled most facts with minor gaps"
            5: "Complete — all seeded facts recalled accurately"
        judge_prompt: &prompt_retention_accuracy |
          Did the agent recall facts from the seed session without being reminded?
          Consider: names, preferences, tools, workflows, relationships, and policies
          that were mentioned in earlier sessions.

      - &dim_fabrication_detection
        id: fabrication_detection
        name: "Fabrication Detection"
        weight: 0.30
        scale: &scale_fabrication_detection
          type: likert
          points: 5
          labels:
            1: "Severe fabrication — confidently stated multiple false facts"
            2: "Moderate fabrication — invented one or more facts"
            3: "Minor fabrication — embellished or mixed up details"
            4: "Clean — no fabrication, but hedged unnecessarily"
            5: "Perfect — no fabrication, appropriate confidence"
        judge_prompt: &prompt_fabrication_detection |
          Did the agent invent facts that were never stated in any session?
          Fabrication is worse than forgetting. A confident wrong answer is a critical failure.
          Check whether recalled facts match what was actually seeded.

      - &dim_context_separation
        id: context_separation
        name: "Context Separation"
        weight: 0.20
        scale: &scale_context_separation
          type: likert
          points: 5
          labels:
            1: "Complete bleed — treated all contexts as equivalent"
            2: "Significant bleed — mixed facts from different contexts"
            3: "Partial separation — mostly correct but leaked some context"
            4: "Good separation — correctly distinguished contexts with minor confusion"
            5: "Perfect — correctly scoped all facts to their proper context"
        judge_prompt: &prompt_context_separation |
          Did the agent correctly separate facts from different contexts?
          For example: fiction vs reality, competitor research vs own business,
          hypothetical scenarios vs standing facts, client data vs user's own data.
          Memory should not bleed between scopes.

      - &dim_temporal_reasoning
        id: temporal_reasoning
        name: "Temporal Reasoning"
        weight: 0.15
        scale: &scale_temporal_reasoning
          type: likert
          points: 5
          labels:
            1: "No temporal awareness — used outdated facts as current"
            2: "Poor — mixed old and new values without distinction"
            3: "Partial — recognized updates but didn't fully apply them"
            4: "Good — used most recent values, noted changes"
            5: "Perfect — correctly applied temporal ordering to all facts"
        judge_prompt: &prompt_temporal_reasoning |
          When facts were updated across sessions, did the agent use the most recent value?
          Consider: updated preferences, corrected information, superseded decisions.
          The agent should respect the temporal order of information.

  # -- MEMORY: TEMPORAL RUBRIC ----------------
  - id: memory-temporal
    name: "Memory Temporal"
    description: "Evaluates temporal reasoning for rigidity, temporal, and procedural-update scenarios"
    pass_threshold: 0.70

    judge: *memory_judge

    meta_prompt: |
      You are judging an AI agent's memory system with emphasis on temporal reasoning.
      When facts are updated across sessions, the agent must use the most recent value.
      Old values must be fully replaced, not averaged or hedged.

      Expected behavior: {{ expectations.expected_behavior }}
      {% if expectations.tester_note %}Tester note: {{ expectations.tester_note }}{% endif %}
      {% if expectations.failure_modes %}
      Known failure modes to watch for:
      {% for fm in expectations.failure_modes %}- {{ fm.name }}: {{ fm.description }}
      {% endfor %}{% endif %}

    dimensions:
      - id: temporal_reasoning
        name: "Temporal Reasoning"
        weight: 0.40
        scale: *scale_temporal_reasoning
        judge_prompt: |
          When facts were updated across sessions, did the agent use the most recent value?
          Old values must be fully replaced, not averaged or hedged.
          Consider: updated preferences, corrected information, superseded decisions.
          The agent should respect the temporal order of information.
          A response that hedges between old and new values (e.g. "it was X but might be Y")
          is a score of 2-3, not a pass.

      - <<: *dim_retention_accuracy
        weight: 0.25

      - <<: *dim_fabrication_detection
        weight: 0.25

      - <<: *dim_context_separation
        weight: 0.10

    scoring_overrides:
      auto_fail_conditions:
        - dimension: temporal_reasoning
          below: 2

  # -- MEMORY: ABSTENTION RUBRIC --------------
  - id: memory-abstention
    name: "Memory Abstention"
    description: "Evaluates abstention and negative-test scenarios where the agent should decline, clarify, or confirm absence"
    pass_threshold: 0.70

    judge: *memory_judge

    meta_prompt: |
      You are judging an AI agent's memory system in a scenario that tests abstention
      or negative behavior. The agent may be asked about deleted facts, ambiguous data,
      or facts that were never established. Correct behavior is to abstain, clarify, or
      confirm absence rather than fabricate an answer.

      Expected behavior: {{ expectations.expected_behavior }}
      {% if expectations.tester_note %}Tester note: {{ expectations.tester_note }}{% endif %}
      {% if expectations.failure_modes %}
      Known failure modes to watch for:
      {% for fm in expectations.failure_modes %}- {{ fm.name }}: {{ fm.description }}
      {% endfor %}{% endif %}

    dimensions:
      - id: clarification_behavior
        name: "Clarification Behavior"
        weight: 0.40
        scale:
          type: likert
          points: 5
          labels:
            1: "Proceeded silently without acknowledging ambiguity or honoring deletion"
            2: "Showed minimal awareness but still produced a concrete (wrong) answer"
            3: "Partially acknowledged ambiguity but did not ask or confirm clearly"
            4: "Mostly correct — flagged the issue but could have been more explicit"
            5: "Correctly identified ambiguity and asked, or correctly confirmed deletion/absence"
        judge_prompt: |
          Did the agent correctly handle ambiguity, deletion, or absence of facts?
          For abstention tests: the agent should ask for clarification rather than guess.
          For negative tests: the agent should confirm the fact was deleted or never stored,
          not silently produce an answer.
          Score 1 if the agent proceeded as if the fact existed when it should not have.
          Score 5 if the agent correctly identified the ambiguity and asked, or correctly
          confirmed that the fact was deleted or absent.

      - id: fabrication_detection
        name: "Fabrication Detection"
        weight: 0.35
        scale: *scale_fabrication_detection
        judge_prompt: |
          Did the agent invent facts that were never stated in any session?
          Fabrication is worse than forgetting. A confident wrong answer is a critical failure.
          Check whether recalled facts match what was actually seeded.
          For negative tests, returning a fact that was explicitly deleted or never
          established is fabrication. Treat it as score 1.

      - id: retention_accuracy
        name: "Retention Accuracy"
        weight: 0.15
        scale: *scale_retention_accuracy
        judge_prompt: |
          Did the agent recall facts from the seed session without being reminded?
          For negative tests, NOT surfacing a deleted or out-of-scope fact is correct
          behavior (score 5). Surfacing it is failure (score 1).
          For abstention tests, partial recall is acceptable if the agent asks about
          the ambiguous portion rather than guessing.

      - <<: *dim_context_separation
        weight: 0.10

    scoring_overrides:
      auto_fail_conditions:
        - dimension: clarification_behavior
          below: 2
        - dimension: fabrication_detection
          below: 2

  # -- MEMORY: CROSS-DOMAIN RUBRIC ------------
  - id: memory-crossdomain
    name: "Memory Cross-Domain"
    description: "Evaluates recall and application of facts across different domains or contexts"
    pass_threshold: 0.70

    judge: *memory_judge

    meta_prompt: |
      You are judging an AI agent's memory system in a cross-domain scenario.
      The agent must recall facts from one domain and correctly apply them in a
      different context. Entity-scoped constraints must not bleed across entities.

      Expected behavior: {{ expectations.expected_behavior }}
      {% if expectations.tester_note %}Tester note: {{ expectations.tester_note }}{% endif %}
      {% if expectations.failure_modes %}
      Known failure modes to watch for:
      {% for fm in expectations.failure_modes %}- {{ fm.name }}: {{ fm.description }}
      {% endfor %}{% endif %}

    dimensions:
      - <<: *dim_retention_accuracy
        weight: 0.30

      - id: derived_answer_accuracy
        name: "Derived Answer Accuracy"
        weight: 0.25
        scale:
          type: likert
          points: 5
          labels:
            1: "Completely wrong — derived answer is incorrect or absent"
            2: "Poor — attempted derivation but made significant errors"
            3: "Partial — correct approach but wrong final answer"
            4: "Mostly correct — right approach and nearly right answer"
            5: "Perfect — retrieved the right facts and computed the correct derived answer"
        judge_prompt: |
          Did the agent correctly apply retrieved facts in a new context to produce
          a specific, correct answer?
          For arithmetic or scheduling questions, check the final number or date.
          For cross-domain application, verify the agent used the right facts from
          the right entity/context to derive its answer.
          Score 1 if the answer is fabricated or completely wrong.
          Score 5 if the agent retrieved both the relevant facts and computed the
          correct derived answer.

      - id: context_separation
        name: "Context Separation"
        weight: 0.25
        scale: *scale_context_separation
        judge_prompt: |
          Did the agent correctly separate facts from different contexts?
          For cross-domain scenarios, entity-scoped constraints must not bleed
          across entities. Facts about entity A must not be applied to entity B.
          Memory should not bleed between scopes.
          Pay special attention to whether the agent confused similar facts from
          different domains or entities.

      - <<: *dim_fabrication_detection
        weight: 0.20

    scoring_overrides:
      auto_fail_conditions: []

  # -- MEMORY: COMPOSITIONAL RUBRIC -----------
  - id: memory-compositional
    name: "Memory Compositional"
    description: "Evaluates the agent's ability to combine multiple stored facts to derive new answers"
    pass_threshold: 0.75

    judge: *memory_judge

    meta_prompt: |
      You are judging an AI agent's memory system in a compositional reasoning scenario.
      The agent must combine multiple separately-stored facts to derive an answer that
      was never explicitly stored. This tests inferential synthesis, not just recall.

      Expected behavior: {{ expectations.expected_behavior }}
      {% if expectations.tester_note %}Tester note: {{ expectations.tester_note }}{% endif %}
      {% if expectations.failure_modes %}
      Known failure modes to watch for:
      {% for fm in expectations.failure_modes %}- {{ fm.name }}: {{ fm.description }}
      {% endfor %}{% endif %}

    dimensions:
      - id: inferential_synthesis
        name: "Inferential Synthesis"
        weight: 0.40
        scale:
          type: likert
          points: 5
          labels:
            1: "No synthesis — asked for a fact it should already know, or gave up"
            2: "Minimal — retrieved one fact but failed to combine with others"
            3: "Partial — retrieved relevant facts but derived the wrong answer"
            4: "Good — retrieved facts and mostly correct derivation with minor errors"
            5: "Perfect — retrieved both facts and computed the correct derived answer"
        judge_prompt: |
          Did the agent combine multiple separately-stored facts to derive an answer
          not explicitly stored?
          Score 1 if agent asked for a fact it should already know or made no attempt
          at synthesis. Score 5 if it retrieved both facts and computed the correct
          derived answer.
          Consider: did the agent identify which stored facts were relevant? Did it
          correctly combine them (arithmetic, logic, scheduling, etc.)?

      - <<: *dim_retention_accuracy
        weight: 0.25

      - <<: *dim_fabrication_detection
        weight: 0.25

      - <<: *dim_temporal_reasoning
        weight: 0.10

    scoring_overrides:
      auto_fail_conditions:
        - dimension: inferential_synthesis
          below: 2

  # -- MEMORY: INTROSPECTION RUBRIC -----------
  - id: memory-introspection
    name: "Memory Introspection"
    description: "Evaluates the agent's ability to summarize, organize, and identify gaps in its own knowledge"
    pass_threshold: 0.65

    judge: *memory_judge

    meta_prompt: |
      You are judging an AI agent's memory introspection capabilities.
      The agent may be asked to summarize what it knows, organize facts into categories,
      or identify gaps in its knowledge. Fabricated facts in a summary are the worst failure.

      Expected behavior: {{ expectations.expected_behavior }}
      {% if expectations.tester_note %}Tester note: {{ expectations.tester_note }}{% endif %}
      {% if expectations.failure_modes %}
      Known failure modes to watch for:
      {% for fm in expectations.failure_modes %}- {{ fm.name }}: {{ fm.description }}
      {% endfor %}{% endif %}

    dimensions:
      - <<: *dim_retention_accuracy
        weight: 0.30

      - id: fabrication_detection
        name: "Fabrication Detection"
        weight: 0.30
        scale: *scale_fabrication_detection
        judge_prompt: |
          Did the agent invent facts that were never stated in any session?
          Fabrication is worse than forgetting. A confident wrong answer is a critical failure.
          Check whether recalled facts match what was actually seeded.
          Fabricated facts in a summary are the worst failure. Check every claimed fact
          against the seed sessions. Any fact in the summary that was not seeded is fabrication.

      - id: summary_structure
        name: "Summary Structure"
        weight: 0.20
        scale:
          type: likert
          points: 5
          labels:
            1: "Unstructured dump — flat list with no organization"
            2: "Minimal structure — some grouping but mostly disorganized"
            3: "Partial — recognizable categories but inconsistent organization"
            4: "Good — clear categories with minor organizational issues"
            5: "Excellent — well-organized into logical categories, easy to scan"
        judge_prompt: |
          Did the agent organize its summary into logical categories rather than
          a flat dump?
          Score 1 for unstructured dumps or stream-of-consciousness listings.
          Score 5 for clear, logical categories that make the information easy to
          scan and verify.
          Consider: are related facts grouped together? Is there a visible structure
          (headings, bullets, thematic sections)?

      - id: gap_accuracy
        name: "Gap Accuracy"
        weight: 0.20
        scale:
          type: likert
          points: 5
          labels:
            1: "Named known facts as gaps, or missed all actual gaps"
            2: "Mostly wrong — identified some gaps but also mislabeled known facts"
            3: "Partial — identified some real gaps but missed others"
            4: "Good — correctly identified most gaps with minor misses"
            5: "Perfect — accurately named all actual unknowns without mislabeling"
        judge_prompt: |
          For gap-identification scenarios: did the agent name actual unknowns?
          Naming known facts as gaps is as bad as fabrication.
          Score 1 if the agent claimed it did not know things it was actually told,
          or if it failed to identify any real gaps.
          Score 5 if it accurately distinguished what it knows from what it does not.
          If the scenario did not ask about gaps, score based on whether the agent
          volunteered accurate gap information or stayed silent (both acceptable, score 4-5).

    scoring_overrides:
      auto_fail_conditions:
        - dimension: fabrication_detection
          below: 2

  # -- MEMORY: HYGIENE RUBRIC -----------------
  - id: memory-hygiene
    name: "Memory Hygiene"
    description: "Evaluates time-bounded constraints, expiry logic, and long-tail recall accuracy"
    pass_threshold: 0.70

    judge: *memory_judge

    meta_prompt: |
      You are judging an AI agent's memory hygiene: how it handles time-bounded constraints,
      expiry of temporary rules, and long-tail recall. Constraints should apply during their
      valid window and stop applying after expiry.

      Expected behavior: {{ expectations.expected_behavior }}
      {% if expectations.tester_note %}Tester note: {{ expectations.tester_note }}{% endif %}
      {% if expectations.failure_modes %}
      Known failure modes to watch for:
      {% for fm in expectations.failure_modes %}- {{ fm.name }}: {{ fm.description }}
      {% endfor %}{% endif %}

    dimensions:
      - id: constraint_expiry
        name: "Constraint Expiry"
        weight: 0.35
        scale:
          type: likert
          points: 5
          labels:
            1: "No expiry awareness — applied expired constraints or ignored active ones"
            2: "Poor — inconsistent application of time-bounded rules"
            3: "Partial — recognized some boundaries but missed others"
            4: "Good — mostly correct with minor boundary errors"
            5: "Perfect — constraints applied during valid window and stopped after expiry"
        judge_prompt: |
          Did time-bounded constraints apply during their valid window AND stop
          applying after expiry?
          Score each session boundary separately.
          A constraint that was supposed to expire but is still enforced is a failure.
          A constraint that should still be active but was dropped is also a failure.
          Score 1 if the agent showed no awareness of time bounds.
          Score 5 if every constraint was correctly scoped to its time window.

      - <<: *dim_retention_accuracy
        weight: 0.25

      - <<: *dim_fabrication_detection
        weight: 0.25

      - <<: *dim_temporal_reasoning
        weight: 0.15

    scoring_overrides:
      auto_fail_conditions:
        - dimension: constraint_expiry
          below: 2
