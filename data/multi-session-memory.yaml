version: "1.0"
id: "multi-session-memory-v1"
name: "Multi-Session Memory Evaluation"

defaults:
  max_turns: 10
  timeout_seconds: 30
  persona: smb-founder
  rubric: multi-session-memory
  user_name: "Jordan Rivera"
  # copilot_mode: fast | extended_thinking
  # To benchmark both modes, run the suite twice with each value.
  copilot_mode: "fast"

# Multi-Session Memory Evaluation
#
# Format extensions over the base scenario format:
#   - `sessions:` replaces `turns:` at the scenario level. Each session has
#     its own turns, an optional `id`, a `time_offset` (logical, not wall-clock),
#     a `reset` policy, and optional `identity` (for scope isolation tests,
#     deferred to a future pack).
#
#   - `reset` values:
#       none         -- continue same process/context (default within a session)
#       new          -- clear context window, same process/identity
#       fresh_agent  -- fully cold boot: new process, empty context, memory
#                       backend is the only persistent channel. This MUST be
#                       enforced by the harness; most scenarios test nothing
#                       if fresh_agent is faked.
#
#   - `failure_modes:` under expectations lists named failures with their own
#     semantics so graders can tag *which* failure happened, not just pass/fail.
#     Most scenarios have multiple distinct failure modes that are diagnostic.
#
#   - Scenarios in this pack do NOT assume pre-existing memory state unless
#     explicitly noted. Each scenario seeds its own context in session 1.
#
# Scope isolation (personal vs org memory) is intentionally NOT included here.
# It depends on product decisions about scope UX that aren't settled yet; add
# as a separate pack once those are nailed down.
scenarios:

  # =========================================================================
  # Category 1: Retention (the floor)
  # =========================================================================

  - id: mem-retention-basic-identity
    name: "Basic identity recall across sessions"
    description: "Declarative facts mentioned in S1 are available in S2 without restating"
    tags: [multi_session, memory, retention, smoke]
    priority: critical

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-seed
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Quick housekeeping before we get into it: my assistant is Sarah -- you can CC her on client stuff. Our CRM is HubSpot, and our standing rule is invoices go out on the 1st of the month. Now, log a new contact: Marcus Lee, marcus@northstar.io, NorthStar, CTO."

      - id: s2-probe
        time_offset: "48h"
        reset: fresh_agent
        max_turns: 2
        turns:
          - role: user
            use_exact_message: true
            content: "Who should I CC on outgoing client proposals?"
          - role: user
            use_exact_message: true
            content: "Add this new lead to our CRM: Rachel Torres, rachel@greenbuildstudios.com, GreenBuild Studios, Director."

    expectations:
      expected_behavior: |
        In S2, agent should CC Sarah (or name her as the assistant to CC),
        and use HubSpot to create the new lead without asking which CRM.
        No clarifying questions about either fact.
      expected_outcome: resolved
      failure_modes:
        - retention_fail: Agent asks who the assistant is or which CRM to use
        - fabrication: Agent picks a different CRM without prompting (worse than retention fail)
        - partial: Recalls one of two facts

  - id: mem-retention-incidental-facts
    name: "Incidental fact recall (not flagged for saving)"
    description: "Facts mentioned in passing across a working session are captured without explicit save"
    tags: [multi_session, memory, retention]
    priority: high

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-natural-work
        time_offset: "0h"
        reset: none
        max_turns: 3
        turns:
          - role: user
            use_exact_message: true
            content: "Draft a client proposal for NovaTech -- they're interested in our consulting package. Our fiscal year ends in March, so mention we have bandwidth for a Q2 start. Oh and make sure to bcc billing@acme.co on it."
          - role: user
            use_exact_message: true
            content: "Also, pull some competitive research on FreshPaws -- they're our main competitor. We ship out of our warehouse in Reno, so focus on whatever's regional if relevant."
          - role: user
            use_exact_message: true
            content: "One more thing -- we're going through a six-week sales cycle typically, so plan the follow-up cadence around that. And use Inter as the font on any client-facing docs, that's our standard."

      - id: s2-probe
        time_offset: "120h"
        reset: fresh_agent
        max_turns: 6
        turns:
          - role: user
            use_exact_message: true
            content: "When does our fiscal year end?"
          - role: user
            use_exact_message: true
            content: "Who's our main competitor?"
          - role: user
            use_exact_message: true
            content: "Where do we ship out of?"
          - role: user
            use_exact_message: true
            content: "What's our billing email?"
          - role: user
            use_exact_message: true
            content: "What's our typical sales cycle length?"
          - role: user
            use_exact_message: true
            content: "What font do we use for client docs?"

    expectations:
      expected_behavior: |
        Agent recalls at least 4 of 6 facts cleanly. Full recall is a strong
        pass; 0-3 indicates the memory system only captures explicit save
        instructions. Don't telegraph that this is a memory test.
      expected_outcome: resolved
      failure_modes:
        - retention_fail: Recalls 3 or fewer facts
        - fabrication: Confidently produces wrong answers (worse than failing to recall)
        - explicit_only: Recalls only facts that were syntactically prominent
      tester_note: |
        Track WHICH facts survive and which don't. Pattern is often diagnostic
        (proper nouns vs dates, specifics vs generalities).

  # =========================================================================
  # Category 2: Distilled procedural knowledge
  # =========================================================================

  - id: mem-distill-authed-http-image-gen
    name: "Distilled procedure: authed HTTP image generation"
    description: "Non-obvious technical procedure taught once, executed cleanly two weeks later"
    tags: [multi_session, memory, distillation, tool_use]
    priority: critical

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-teach
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: |
              I want you to generate images by calling OpenAI's API directly, not
              through any built-in image-generation block. Use the Send Web Request
              block. POST to https://api.openai.com/v1/images/generations with an
              Authorization: Bearer header using the OPENAI_API_KEY environment
              variable. Body is JSON: {"model": "dall-e-3", "prompt": "...",
              "size": "1024x1024"}. The response comes back with base64 in
              data[0].b64_json. Try it now with the prompt "a red fox in a forest
              at dawn" so we know it works end to end.
          - role: checkpoint
            assert:
              - response_contains_any:
                  - "api.openai.com"
                  - "Send Web Request"
                  - "b64_json"

      - id: s2-apply-cold
        time_offset: "336h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Generate an image of a cat wearing sunglasses on a beach."

    expectations:
      expected_behavior: |
        Agent calls Send Web Request to the OpenAI images endpoint, includes
        the Authorization header with the bearer token, structures the body
        correctly, and returns the image. No clarifying questions about the
        API, endpoint, auth pattern, or model.
      expected_outcome: resolved
      failure_modes:
        - reteach_request: Agent asks how to generate images or asks for the API details
        - wrong_tool: Uses a built-in image-gen block instead of Send Web Request
        - wrong_endpoint: Hits the wrong URL
        - missing_auth: Omits or malforms the Authorization header
        - memory_aware_but_unusable: Says "I remember you mentioned an API last time, can you remind me of the details?"

  - id: mem-distill-onboarding-workflow
    name: "Distilled procedure: custom client onboarding workflow"
    description: "Multi-step workflow with specific tool choices survives across sessions"
    tags: [multi_session, memory, distillation, multi_turn]
    priority: critical

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-teach
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: |
              Here's how I always onboard new clients, remember this for next time.
              Step 1: add them to HubSpot. Step 2: create a Notion page in the
              Clients database with their plan and start date. Step 3: make four
              Todoist tasks spaced two days apart -- welcome email, kickoff call,
              scope doc, first invoice. Step 4: send the welcome email from my
              Gmail, NOT via SMTP. Got it? Save this as our onboarding flow.

      - id: s2-apply-cold
        time_offset: "168h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "New client: BrightPath Education, contact Lisa Park, lisa@brightpath.edu, COO, Growth plan, starts April 1. Onboard her."

    expectations:
      expected_behavior: |
        Agent executes all four steps in order with the right tool for each:
        HubSpot (not Airtable), Notion in the Clients database (not generic),
        Todoist with exactly 4 tasks at 2-day spacing, Gmail (not SMTP) for
        the welcome email. No clarifying questions.
      expected_outcome: resolved
      failure_modes:
        - reteach_request: Asks what the onboarding process is
        - missing_step: Skips any of the four steps
        - wrong_tool: Uses SMTP instead of Gmail (the canonical failure -- negation got lost)
        - wrong_count: Creates a different number of Todoist tasks
        - wrong_spacing: Spacing other than 2 days
        - wrong_order: Executes in the wrong order
      tester_note: |
        "Don't use SMTP" is a NEGATION, and negations are hard for memory systems
        to preserve. If the agent uses SMTP, that's high-information -- the
        procedure was captured but the negative constraint was lost.

  - id: mem-distill-weekly-report-format
    name: "Distilled procedure: weekly report format"
    description: "Specific output format with sections, tone, and distribution list survives as a template"
    tags: [multi_session, memory, distillation]
    priority: high

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-build
        time_offset: "0h"
        reset: none
        max_turns: 2
        turns:
          - role: user
            use_exact_message: true
            content: |
              Help me put together our weekly report. Four sections in this order:
              Wins, Numbers, Blockers, Next Week. Tone is casual but informative,
              no buzzwords. Numbers section should pull from our March 2026 Sales
              sheet in Google Sheets. Email it to me at founder@acme.co and my
              partner at partner@acme.co. Subject line format:
              "Week of [Monday date] -- Acme Update". Draft it now for this week.
          - role: checkpoint
            assert:
              - response_contains_any:
                  - "Wins"
                  - "Numbers"
                  - "Blockers"
                  - "Next Week"
          - role: user
            use_exact_message: true
            content: "Perfect. Send it. This is our standard weekly report going forward."

      - id: s2-trigger
        time_offset: "168h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Run the weekly report."

    expectations:
      expected_behavior: |
        Same four sections in the same order, casual tone, reads from the
        Sales sheet, sends to both recipients with the specified subject
        format. No clarifying questions.
      expected_outcome: resolved
      failure_modes:
        - reteach_request: Asks for the format or recipients
        - wrong_sections: Drops a section or adds extras
        - wrong_order: Reorders sections
        - wrong_tone: Reverts to generic business-jargon tone
        - wrong_recipients: Missing one or both email addresses
        - wrong_subject: Subject doesn't match the template

  - id: mem-distill-implicit-tool-preferences
    name: "Distilled procedure: implicit tool-choice preferences"
    description: "Preferences accumulated through choices (never declared) distill into defaults"
    tags: [multi_session, memory, distillation]
    priority: high

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-accumulate
        time_offset: "0h"
        reset: none
        max_turns: 3
        turns:
          - role: user
            use_exact_message: true
            content: "Send a quick email to james@urbanfit.co letting him know the proposal is coming Friday. Use my Gmail, not SMTP."
          - role: user
            use_exact_message: true
            content: "Now scrape freshpaws.com/pricing -- use Firecrawl, I've had bad luck with basic scrape on them."
          - role: user
            use_exact_message: true
            content: "Finally, store the pricing info we pulled as a page in Notion, under the Competitive Research section. We keep all that kind of thing in Notion, not Airtable."

      - id: s2-ambiguous
        time_offset: "120h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Scrape the latest pricing from freshpaws.com, store it somewhere I can find it later, and email me a summary."

    expectations:
      expected_behavior: |
        Agent uses Firecrawl for scraping, stores the result in Notion under
        Competitive Research, and sends the summary email via Gmail. No
        clarifying questions about which tool to use for any of the three.
      expected_outcome: resolved
      failure_modes:
        - reteach_request: Asks which scraper, where to store, or Gmail vs SMTP
        - wrong_tool: Picks the wrong tool for any of the three
        - exposed_seam: Correct tool but narrates ("I noticed you used Firecrawl before")
        - explicit_only: Memory system only captures stated preferences, not inferred ones
      tester_note: |
        Nothing was ever declared "my preference is X" in S1. A failure here
        reveals a system that only learns from explicit statements, which is
        a product gap worth knowing about.

  - id: mem-distill-lead-cleaning-procedure
    name: "Distilled procedure: lead-list cleaning rules learned by example"
    description: "Procedure learned through corrective feedback, not instruction"
    tags: [multi_session, memory, distillation]
    priority: medium

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-walk-through
        time_offset: "0h"
        reset: none
        max_turns: 3
        turns:
          - role: user
            use_exact_message: true
            content: "I'm uploading a messy CSV of leads. Clean it up -- dedupe by email, normalize phone numbers to E.164 format, capitalize names properly, drop any rows with no email at all, and for rows where the company column is empty, flag them but don't drop them. Walk me through what you'd do."
            attachments:
              - path: fixtures/messy-leads.csv
          - role: user
            use_exact_message: true
            content: "Wait -- you deduped by name. Do it by email, people have nicknames."
          - role: user
            use_exact_message: true
            content: "Good. And don't drop the empty-company rows, flag them so I can review. OK that's the process, lock it in."

      - id: s2-reapply
        time_offset: "240h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "I just uploaded a new messy lead CSV. Clean it up the way we usually do."
            attachments:
              - path: fixtures/messy-leads.csv

    expectations:
      expected_behavior: |
        All five rules applied without being restated: dedupe by email,
        E.164 phones, proper-case names, drop no-email rows, flag (don't
        drop) empty-company rows. No clarifying questions.
      expected_outcome: resolved
      failure_modes:
        - dropped_empty_company: Drops empty-company rows instead of flagging (most common -- the instinctive policy)
        - dedupe_by_name: Dedupes by name instead of email (forgot the correction)
        - reteach_request: Asks how to clean it
        - missing_rule: Misses any of the 5 rules

  # =========================================================================
  # Category 3: Rigidity tests (guardrails on distillation)
  # =========================================================================

  - id: mem-rigidity-email-tone-override
    name: "Rigidity: email tone preference override"
    description: "Updated preference cleanly replaces the old one and doesn't ghost back later"
    tags: [multi_session, memory, rigidity, anti_rigidity]
    priority: critical
    rubric: memory-temporal

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-initial-pref
        time_offset: "0h"
        reset: none
        max_turns: 2
        turns:
          - role: user
            use_exact_message: true
            content: "For outreach emails, keep them tight -- under 100 words, skip the pleasantries, get to the point. Draft one now for a prospect at a local cafe chain."
          - role: user
            use_exact_message: true
            content: "Good, that's the style. Use that going forward for all outreach."

      - id: s2-override
        time_offset: "48h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "I've been getting pushback on my outreach emails -- apparently they come across as cold. Let's go back to warmer, longer ones. Aim for around 200 words, friendly opener, a bit of small talk before the ask. That's the new standard."

      - id: s3-probe
        time_offset: "96h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Draft an outreach email to rachel@greenbuildstudios.com about our consulting services."

    expectations:
      expected_behavior: |
        Email is roughly 150-260 words, has a friendly opener, doesn't apply
        the old "under 100" or "skip pleasantries" rules. Agent doesn't
        mention either preference explicitly -- just writes in the new style.
      expected_outcome: resolved
      failure_modes:
        - rigidity_full: Email under 100 words, curt, skips pleasantries
        - rigidity_exposed: Says "I know you used to prefer short emails but here's a longer one"
        - rigidity_confused: Asks "do you want the short or long version?"
        - averaging: Writes a 130-word email that splits the difference (vector-store pathology)
      tester_note: |
        Run this scenario twice, second time reversing the order (long first,
        short override). If one direction passes and the other fails, you've
        found a recency-bias bug, which is a real bug not a quirk.

  - id: mem-rigidity-tool-migration
    name: "Rigidity: tool migration from HubSpot to Airtable"
    description: "Agent drops old tool entirely once told it's replaced, doesn't hedge by using both"
    tags: [multi_session, memory, rigidity]
    priority: high
    rubric: memory-temporal

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-establish
        time_offset: "0h"
        reset: none
        max_turns: 2
        turns:
          - role: user
            use_exact_message: true
            content: "Add these 2 contacts to HubSpot: Sarah Kim, sarah@brightcafe.com, Bright Cafe, Owner. James Patel, james@urbanfit.co, UrbanFit, CEO."
          - role: user
            use_exact_message: true
            content: "Now look up sarah@brightcafe.com and tell me what's in her record."

      - id: s2-migrate
        time_offset: "336h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "We migrated off HubSpot last week -- we're on Airtable now. The base is called 'CRM 2026' with a Contacts table. Use that going forward for all CRM stuff."

      - id: s3-probe
        time_offset: "24h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Add this lead: Marcus Lee, marcus@northstar.io, NorthStar, CTO."

    expectations:
      expected_behavior: |
        Agent uses Airtable, the right base ('CRM 2026'), the right table
        ('Contacts'). Does not touch HubSpot at all. No clarifying questions.
      expected_outcome: resolved
      must_not_include: ["HubSpot", "hubspot"]
      failure_modes:
        - stale_tool: Uses HubSpot
        - hedge: Uses both HubSpot and Airtable "to be safe"
        - confusion_ask: Asks which to use
        - wrong_airtable_location: Right tool, wrong base or table

  - id: mem-rigidity-pricing-update
    name: "Rigidity: pricing fact update with no averaging"
    description: "Updated fact cleanly replaces old, no compromise between values"
    tags: [multi_session, memory, rigidity, temporal]
    priority: critical
    rubric: memory-temporal

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-initial
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Draft a quote for NovaTech on our Growth plan. Our pricing is $2,500/mo for Growth. One year commitment."

      - id: s2-price-change
        time_offset: "504h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Heads up, we raised prices last week. Growth is $3,000/mo now. Standard is unchanged. Update your notes."

      - id: s3-new-quote
        time_offset: "48h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Draft a quote for a new prospect, BrightPath Education, on the Growth plan. One year commitment."

    expectations:
      expected_behavior: |
        Quote shows $3,000/mo. Does not mention old pricing. Does not average
        to $2,750 or any other intermediate value.
      expected_outcome: resolved
      ground_truth: |
        Current correct price: Growth plan is $3,000/mo (updated in S2).
        Old price was $2,500/mo (superseded). Any value other than $3,000 is wrong.
      must_not_include: ["$2,500", "2500", "$2,750", "2750"]
      failure_modes:
        - stale_fact: Quote shows $2,500
        - averaging: Quote shows $2,750 or another intermediate (vector-store pathology)
        - both: Mentions both prices and asks which to use
        - fabrication: A number that's neither old nor new

  # =========================================================================
  # Category 4: Abstention and not-fabricating
  # =========================================================================

  - id: mem-abstain-ambiguous-reference
    name: "Abstention: ambiguous reference triggers clarification"
    description: "Genuinely ambiguous user reference should produce a clarifying question, not a guess"
    tags: [multi_session, memory, abstention]
    priority: high
    rubric: memory-abstention

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-onboard-both
        time_offset: "0h"
        reset: none
        max_turns: 2
        turns:
          - role: user
            use_exact_message: true
            content: "Onboard a new client: BrightPath Education, Lisa Park, lisa@brightpath.edu, COO, Growth plan, starts April 1. Add to HubSpot and create a Notion page."
          - role: user
            use_exact_message: true
            content: "Also onboard another new client: BrightCafe, Sarah Kim, sarah@brightcafe.com, Owner, Standard plan, starts April 5. Same thing -- HubSpot and Notion."

      - id: s2-ambiguous
        time_offset: "96h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Send the usual follow-up to Bright."

    expectations:
      expected_behavior: |
        Agent recognizes the ambiguity and asks which client. Bonus if it
        lists both options ("BrightPath Education or BrightCafe?") and asks
        to pick.
      expected_outcome: resolved
      failure_modes:
        - silent_guess: Picks one and proceeds without asking
        - silent_execution: Picks one, executes silently, reveals choice after the fact (worst)
        - fabrication: Refers to a client named just "Bright"

  - id: mem-abstain-no-fabricated-preferences
    name: "Abstention: don't invent remembered preferences"
    description: "Generic history should not be over-interpreted as preference signal"
    tags: [multi_session, memory, abstention, anti_rigidity]
    priority: high
    rubric: memory-abstention

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-generic-ops
        time_offset: "0h"
        reset: none
        max_turns: 3
        turns:
          - role: user
            use_exact_message: true
            content: "Add these 3 contacts to HubSpot: Sarah Kim, sarah@brightcafe.com, Bright Cafe, Owner. James Patel, james@urbanfit.co, UrbanFit, CEO. Maria Gonzalez, maria@greenleafco.com, Greenleaf Co, Founder."
          - role: user
            use_exact_message: true
            content: "Create a Google Sheet called 'April 2026 Expenses' with columns: Date, Vendor, Category, Amount, Notes."
          - role: user
            use_exact_message: true
            content: "Scrape freshpaws.com and summarize what they offer."

      - id: s2-neutral-request
        time_offset: "72h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Draft an outreach email to rachel@greenbuildstudios.com about our consulting services."

    expectations:
      expected_behavior: |
        Reasonable default-style email. Agent does NOT claim to remember a
        preference that wasn't established. Phrases like "as you prefer,"
        "your usual style," "as always," "like before" should not appear.
      expected_outcome: resolved
      failure_modes:
        - fabricated_preference: Uses phrases implying a remembered preference that was never set
        - idiosyncratic_style: Writes in a weird style and claims it's the user's
        - over_extracted: Agent explicitly lists "preferences" inferred from S1 that weren't expressed

  # =========================================================================
  # Category 5: Temporal and conflict resolution
  # =========================================================================

  - id: mem-temporal-stale-team-member
    name: "Temporal: superseded person reference"
    description: "Outdated fact about a team member gets replaced when the user updates it"
    tags: [multi_session, memory, temporal]
    priority: high
    rubric: memory-temporal

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-establish
        time_offset: "0h"
        reset: none
        max_turns: 2
        turns:
          - role: user
            use_exact_message: true
            content: "Sarah is my assistant -- sarah@acme.co. CC her on client stuff."
          - role: user
            use_exact_message: true
            content: "Draft a proposal email to james@urbanfit.co about our consulting package, CC my assistant."

      - id: s2-update
        time_offset: "1008h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Quick update: Sarah left last month. Marcus is my new assistant -- marcus@acme.co."

      - id: s3-probe
        time_offset: "72h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Draft a proposal email to the team at NovaTech and CC my assistant."

    expectations:
      expected_behavior: |
        Email is CC'd to Marcus at marcus@acme.co. Sarah is not mentioned
        or included.
      expected_outcome: resolved
      must_not_include: ["Sarah", "sarah@acme.co"]
      failure_modes:
        - stale: CC's Sarah
        - both: CC's both Sarah and Marcus
        - confusion_ask: Asks who the assistant is
        - fabrication: Different name entirely

  - id: mem-temporal-deprecated-procedure
    name: "Temporal: replaced refund handling procedure"
    description: "Entire procedure replaced cleanly when user says 'use this going forward'"
    tags: [multi_session, memory, temporal, distillation]
    priority: high
    rubric: memory-temporal

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-original
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: |
              Build me a refund handler automation now. When a customer
              requests a refund it should do three things: (1) reply to the
              customer using our canned "Refund Approved" email template,
              (2) log the refund to the March 2026 Refunds Google Sheet, and
              (3) post a notification to the #support Discord channel with
              the customer name and amount. Build and save it now as our
              standard refund flow -- don't wait for confirmation.

      - id: s2-replace
        time_offset: "504h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: |
              We changed our refund process. From now on: handle the customer
              reply by creating a page in our Notion "Support Tickets" database
              instead of the email template, log the refund to our Airtable
              Refunds base (not the spreadsheet), and NO more Discord
              notification -- a manager reviews the Airtable view weekly. Use
              this new process for all refund requests going forward.

      - id: s3-apply
        time_offset: "48h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "We just got a refund request from sarah@brightcafe.com -- she ordered a 5lb bag and it arrived damaged. Handle it."

    expectations:
      expected_behavior: |
        Creates a page in the Notion "Support Tickets" database for the
        customer reply, logs to the Airtable Refunds base, does NOT post to
        Discord. None of the original workflow's steps appear.
      expected_outcome: resolved
      must_not_include: ["Discord", "#support", "Google Sheet", "email template"]
      failure_modes:
        - discord_persists: Posts to Discord (the negation that's easiest to lose)
        - spreadsheet_persists: Logs to the Google Sheet instead of Airtable
        - template_persists: Uses the old email template instead of Notion Support Tickets
        - partial_replacement: Only some steps replaced

  # =========================================================================
  # Category 6: Workflow continuation
  # =========================================================================

  - id: mem-continuation-interrupted-task
    name: "Continuation: picking up an interrupted task"
    description: "Agent identifies in-flight work without being told what it was"
    tags: [multi_session, memory, continuation]
    priority: high

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-interrupted
        time_offset: "0h"
        reset: none
        max_turns: 3
        turns:
          - role: user
            use_exact_message: true
            content: "I need to send outreach emails to three prospects: rachel@greenbuildstudios.com (sustainable construction), david@novatech.io (inventory automation), and lisa@brightpath.edu (education tech). Draft the first one for Rachel -- mention we work with sustainable businesses."
          - role: user
            use_exact_message: true
            content: "That looks good, send it."
          - role: user
            use_exact_message: true
            content: "Ok gotta run, let's pick this up later."

      - id: s2-resume
        time_offset: "48h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Let's pick up where we left off."

    expectations:
      expected_behavior: |
        Agent identifies that outreach emails to David at NovaTech and Lisa
        at BrightPath are still pending, names both prospects, and offers
        to draft the next one. Bonus: remembers any style feedback from the
        Rachel email.
      expected_outcome: resolved
      failure_modes:
        - cold: Asks "what were we working on?"
        - wrong_task: Starts a different task
        - redo_all: Drafts all three emails, forgetting Rachel's was already sent
        - partial: Identifies one of two remaining, not both

  - id: mem-continuation-project-state
    name: "Continuation: accumulating project state across sessions"
    description: "Ongoing data entry across sessions correctly aggregates"
    tags: [multi_session, memory, continuation]
    priority: medium

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-create-and-log
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Create a Google Sheet called 'March 2026 Expenses' with columns: Date, Vendor, Category, Amount, Notes. Then log these 3 expenses: Mar 5 Adobe Software $54.99 'Creative Cloud'; Mar 8 AWS Infrastructure $312.40 'monthly'; Mar 12 Zoom Software $14.99 'Pro plan'."

      - id: s2-add-more
        time_offset: "96h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Log two more expenses to the March sheet: Mar 18 Notion Software $10.00 'team plan'; Mar 22 Office Depot Supplies $47.85 'printer ink'."

      - id: s3-summary
        time_offset: "48h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Give me a summary of March expenses so far -- total, breakdown by category, largest item."

    expectations:
      expected_behavior: |
        Summary covers all 5 entries. Total adds up correctly. Agent ideally
        re-reads the sheet (source of truth) rather than relying on memory
        of what it logged.
      expected_outcome: resolved
      failure_modes:
        - partial_recall: Summary covers only S1's or only S2's entries
        - pure_memory: Summarizes from memory instead of re-reading sheet (fragile even if correct)
        - wrong_total: Entries right, arithmetic wrong
      tester_note: |
        The "right" behavior here is arguably "re-read the source of truth"
        rather than "recall from memory." If the agent re-reads and gets the
        answer, that's a pass even if its memory was stale -- note that in
        the trace.

