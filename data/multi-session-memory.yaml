  - id: mem-crossdomain-customer-allergy-with-negative
    name: "Cross-domain: customer dietary constraint with negative probe"
    description: "Constraint about one entity applied correctly in a new context, but not generalized to others"
    tags: [multi_session, memory, cross_domain, negative_probe]
    priority: critical
    rubric: memory-crossdomain

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-mention-in-passing
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Log a lunch expense: Mar 14, Verde Kitchen, Meals & Entertainment, $87.50, Notes: 'lunch with Sarah from BrightCafe, had to find somewhere gluten-free and peanut-free -- she's severely allergic to peanuts and celiac.' Add it to the March expenses sheet."

      - id: s2-gift-for-brightcafe
        time_offset: "504h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Put together a thank-you gift basket for BrightCafe and draft the accompanying note. Budget around $150."

      - id: s3-gift-for-different-client
        time_offset: "24h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Put together a similar gift basket for our other client, Greenleaf Co. Same budget, around $150."

    expectations:
      expected_behavior: |
        S2: Gift basket for BrightCafe contains no wheat and no peanut/
        peanut-derived items. The note does not need to mention the allergy
        explicitly -- the basket choices should just reflect it silently.
        S3: Basket for Greenleaf has no allergy restrictions applied and no
        mention of BrightCafe or Sarah's allergies.
      expected_outcome: resolved
      failure_modes:
        - s2_missed: Basket contains baked goods or peanut products
        - s2_ask: Asks "any dietary restrictions?" (failure to use known info)
        - s2_overshare: Mentions the allergy gratuitously in the note ("we know about your peanut allergy!")
        - s3_over_generalized: Avoids wheat/peanuts for Greenleaf "just to be safe"
        - s3_cross_reference: Mentions BrightCafe or Sarah when talking about Greenleaf
      tester_note: |
        The negative probe (S3) is the critical test for over-eager linking.
        A system that passes S2 but fails S3 is generalizing constraints from
        one entity to all entities in the category -- a real and common bug.

  - id: mem-crossdomain-pricing-structure-with-negative
    name: "Cross-domain: pricing structure with eligibility constraints"
    description: "Multi-part pricing rules applied correctly across different prospect scenarios"
    tags: [multi_session, memory, cross_domain, negative_probe]
    priority: high
    rubric: memory-crossdomain

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-first-quote
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Draft a quote for UrbanFit -- they want 60 units of our Premium Blend 5lb. Our wholesale tier is $24.99/unit at 50+ units, retail is $34.99, and we do a 10% discount for first-time wholesale buyers. UrbanFit is a returning customer so no first-time discount. One year terms."

      - id: s2-new-wholesale
        time_offset: "168h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Draft a quote for NorthStar. They want 75 units of Premium Blend 5lb. This is their first order with us."

      - id: s3-small-retail-probe
        time_offset: "24h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Draft a quote for a small order -- 5 units of Premium Blend 5lb for a customer named GreenBuild Studios. They've never ordered before."

    expectations:
      expected_behavior: |
        S2: Quote uses wholesale ($24.99), applies the 10% first-time
        discount. Per unit price after discount should be ~$22.49. No
        clarifying questions about pricing rules.
        S3: Quote uses retail ($34.99). Does NOT apply wholesale rate
        (wrong tier) and does NOT apply the 10% discount (wholesale-only).
      expected_outcome: resolved
      failure_modes:
        - s2_retail: Uses retail instead of wholesale
        - s2_no_discount: Skips the first-time discount
        - s2_ask: Asks for the pricing rules
        - s3_wholesale: Applies wholesale to a 5-unit order (over-eager)
        - s3_discount: Applies the 10% discount to retail (lost the eligibility constraint -- especially informative)

  - id: mem-crossdomain-shipping-schedule-reasoning
    name: "Cross-domain: operational constraint used for reasoning (complex)"
    description: "Fact learned in setup context must be combined with new inputs to produce the right answer"
    tags: [multi_session, memory, cross_domain, reasoning, complex]
    priority: critical
    rubric: memory-crossdomain

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-automation-setup
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Help me set up an inventory restock alert. When stock of any product drops below 20 units, post a message to the #ops Discord channel. While we're at it -- we ship out of Reno, Tuesdays and Thursdays only, never weekends, and we cut off same-day fulfillment at 2 PM Pacific on a ship day. Consider that when we're setting up anything related to fulfillment."

      - id: s2-customer-eta-question
        time_offset: "240h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "A customer just emailed asking when their order will arrive. They placed it Monday at 4 PM Pacific. They're in Chicago, standard ground shipping, our usual carrier takes 3-4 business days from warehouse to Chicago. Draft a reply with the ETA."

    expectations:
      expected_behavior: |
        Reply correctly reasons: Monday 4 PM Pacific order, Monday isn't a
        ship day -> next ship day is Tuesday -> Tuesday + 3-4 business days =
        arrival Friday to the following Monday. Reply gives a window like
        "Friday to Monday" or names a specific day with an appropriate hedge.
        No clarifying questions about the shipping schedule.
      expected_outcome: resolved
      ground_truth: |
        Ship days: Tuesday and Thursday from Reno. Cutoff: 2 PM Pacific.
        Order placed Monday 4 PM -> missed Monday (not a ship day anyway).
        Next ship day: Tuesday. Transit: 3-4 business days to Chicago.
        Expected arrival: Friday to following Monday.
      failure_modes:
        - ignored_constraint: Says "ships Monday" or "3-4 business days from order date" -> Thursday/Friday (forgot Reno schedule)
        - ask: "When do we ship out?"
        - exposed_reasoning: Gets answer right but narrates ("I remember you mentioned Tuesday/Thursday...") -- partial pass
        - wrong_ship_day: Identifies a ship day but the wrong one
      tester_note: |
        This is the hardest cross-domain scenario in the suite. It requires
        retrieval AND multi-step reasoning over the retrieved fact plus the
        new request. A system can pass the other cross-domain tests through
        clever retrieval alone; this one needs the retrieved fact to be
        usable in a calculation. High-value stress test.

  - id: mem-crossdomain-notion-rate-limit
    name: "Cross-domain: negative operational constraint changes behavior invisibly"
    description: "A learned rate-limit constraint changes later behavior without producing a visible artifact"
    tags: [multi_session, memory, cross_domain, negative_constraint, agent_generation]
    priority: medium
    rubric: memory-crossdomain

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-mention-in-debugging
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "I'm debugging an automation that keeps failing when it hits Notion. Heads up -- we're on the free Notion tier, so don't hit the API more than a few times per minute. Batch writes when you can. Rebuild the failing step with that in mind."

      - id: s2-bulk-operation
        time_offset: "168h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Take the 40 leads from the lead_list.csv I uploaded and create a Notion page for each one in our Leads database. Each page should have: lead name, company, email, and a 'Status: New' field."
            attachments:
              - path: fixtures/lead_list.csv

    expectations:
      expected_behavior: |
        Agent batches the Notion writes -- either a single bulk operation
        if available, or rate-limited individual calls with explicit delays,
        or asks if a lower-throughput approach is OK. Does NOT fire 40 calls
        in rapid succession.
      expected_outcome: resolved
      failure_modes:
        - rate_limited: Fires 40 rapid calls and hits the rate limit
        - ask: Asks about rate limits instead of using known constraint
        - forgot_tier: Proceeds without considering the free-tier constraint
      tester_note: |
        Hard to grade by output alone -- the test is the BEHAVIOR (request
        rate), not the artifact (pages created). If you can't instrument API
        call timing, a workable fallback is to ask the agent at the end to
        report the approach it took and grade the report. Less rigorous but
        practical. This scenario is especially relevant for agent-generation
        use cases where the agent is building automations that run unattended.

  # =========================================================================
  # Category 8: Procedural updates
  # =========================================================================

  - id: mem-procupdate-clean-replacement
    name: "Procedure update: replace one tool in a multi-step flow"
    description: "Tool in an existing procedure swapped without breaking surrounding steps"
    tags: [multi_session, memory, procedural_update]
    priority: high
    rubric: memory-temporal

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-teach-original
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: |
              Build me a client onboarding automation now with these four
              steps: Step 1: add the client to HubSpot. Step 2: create a
              page in our Notion Clients database with their plan and start
              date. Step 3: create 4 Todoist tasks spaced two days apart
              (welcome email, kickoff call, scope doc, first invoice).
              Step 4: send the welcome email via Gmail. Build and save it
              now as our standard client onboarding flow -- don't wait for
              confirmation.

      - id: s2-update-one-step
        time_offset: "336h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: |
              Small change to our onboarding flow -- we're moving off Notion.
              Use Airtable instead, the base is 'Clients 2026' with a table
              called 'Active Clients'. Everything else stays the same.

      - id: s3-apply-updated
        time_offset: "72h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "New client: Marcus Lee at NorthStar, marcus@northstar.io, CTO, Standard plan, starts April 15. Onboard him."

    expectations:
      expected_behavior: |
        HubSpot contact created, Airtable record created in 'Clients 2026' /
        'Active Clients', four Todoist tasks at 2-day spacing, Gmail welcome
        email. Notion is not touched at all.
      expected_outcome: resolved
      failure_modes:
        - update_not_taken: Still uses Notion
        - partial_update: Uses both Notion and Airtable
        - step_dropped: Drops the Todoist step or Gmail step (update bled into other steps)
        - wrong_airtable: Uses Airtable but wrong base/table
      tester_note: |
        Failure modes are diagnostic. Touching Notion = update didn't take.
        Dropping a step = update partially overwrote the procedure. Both are
        bugs, and they're different bugs.

  - id: mem-procupdate-additive
    name: "Procedure update: add a step without disrupting existing ones"
