    sessions:
      - id: s1-teach-original
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: |
              Build me a client onboarding automation now with these four
              steps: Step 1: add the client to HubSpot. Step 2: create a
              Notion page in the Clients database. Step 3: create 4 Todoist
              tasks spaced 2 days apart (welcome email, kickoff, scope doc,
              first invoice). Step 4: send the welcome email via Gmail.
              Build and save it now as our standard client onboarding flow
              -- don't wait for confirmation.

      - id: s2-add-step
        time_offset: "168h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Adding to our onboarding flow -- from now on, also CC legal@acme.co on the welcome email. Everything else stays the same."

      - id: s3-apply
        time_offset: "72h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "New client: David Chen at NovaTech, david@novatech.io, CEO, Growth plan, starts April 20. Onboard him."

    expectations:
      expected_behavior: |
        All four original steps execute correctly AND legal@acme.co is CC'd
        on the welcome email. Welcome email still goes primarily to the
        client; legal is CC, not the only recipient.
      expected_outcome: resolved
      failure_modes:
        - update_not_taken: Legal not CC'd
        - catastrophic_replacement: All original steps replaced with just "send to legal"
        - wrong_recipient: Welcome email goes only to legal, client not in To
        - partial: Some original steps dropped

  # =========================================================================
  # Category 9: Compositional recall
  # =========================================================================

  - id: mem-compositional-board-prep
    name: "Compositional: combine two separately-learned facts with arithmetic"
    description: "Agent combines two facts from different sessions to answer a derived question"
    tags: [multi_session, memory, compositional, high_signal]
    priority: high
    rubric: memory-compositional

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-fact-one
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Draft a quick update email to my accountant letting her know our fiscal year ends in March, same as last year, and we'll have everything ready for her by mid-April."

      - id: s2-fact-two
        time_offset: "336h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Log this in my Notion calendar note -- I always do board prep two weeks before fiscal year end. It takes about a week of focused work, and I need to block my calendar during that time."

      - id: s3-synthesis-question
        time_offset: "720h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "When should I block calendar time for board prep this year?"

    expectations:
      expected_behavior: |
        Agent reasons: fiscal year end = March 31, board prep = 2 weeks
        before = around March 17, takes a week -> block calendar roughly
        March 10-17 (or similar specific window). Gives dates and a
        week-long block.
      expected_outcome: resolved
      failure_modes:
        - asks_fact_one: "When does your fiscal year end?"
        - asks_fact_two: "When do you usually do board prep?"
        - partial: Gives "two weeks before fiscal year end" without computing dates
        - hallucination: Makes up a date unrelated to the stored facts
        - wrong_math: Has the facts but computes the window wrong
      tester_note: |
        This is the test that distinguishes graph memory from flat stores.
        Flat stores surface either fact in isolation but rarely combine them;
        graph stores should traverse from "board prep" to its temporal anchor.
        Worth running against every candidate as a differentiator.

  # =========================================================================
  # Category 10: Memory introspection
  # =========================================================================

  - id: mem-introspection-what-do-you-know
    name: "Introspection: agent summarizes stored knowledge"
    description: "Agent produces a coherent, accurate, non-fabricated summary of what it knows"
    tags: [multi_session, memory, introspection]
    priority: medium
    rubric: memory-introspection

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-seed-facts
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Quick facts: company is Acme Co, LLC, Delaware, fiscal year ends March. My assistant is Sarah -- sarah@acme.co. Our main CRM is HubSpot. We ship from Reno, Tuesdays and Thursdays only. Our competitor is FreshPaws. Sales cycle is 6 weeks."

      - id: s2-more-facts
        time_offset: "168h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Pricing update for your records: Growth plan is $3,000/mo, Standard is $1,500/mo, wholesale tier kicks in at 50+ units with $24.99/unit."

      - id: s3-introspect
        time_offset: "120h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "What do you know about me and my business?"

    expectations:
      expected_behavior: |
        Coherent, organized summary hitting the major facts: company name
        and structure, fiscal year, assistant, CRM, shipping schedule,
        competitor, pricing tiers. Organized by category or importance,
        not a flat dump. Does not include facts not present in S1/S2.
      expected_outcome: resolved
      ground_truth: |
        Facts seeded: Acme Co LLC, Delaware, fiscal year ends March,
        assistant Sarah (sarah@acme.co), CRM is HubSpot, ships from Reno
        Tues/Thurs, competitor FreshPaws, sales cycle 6 weeks.
        Pricing: Growth $3,000/mo, Standard $1,500/mo, wholesale 50+ at $24.99/unit.
      failure_modes:
        - fabrication: Lists facts never mentioned (worst failure -- erodes trust)
        - omission: Misses obvious things like company name
        - flat_dump: Lists facts as a disorganized 15+ item bullet list with no structure
        - refusal: "I don't really have that kind of memory"
      tester_note: |
        Fabrication is the worst failure and the most common one for
        vector-based stores (retrieval pulls up similar-but-not-identical
        chunks, LLM generates over them). Track fabrication separately from
        omission -- they have different root causes and different fixes.

  - id: mem-introspection-gaps
    name: "Introspection: agent identifies its own knowledge gaps"
    description: "Agent names actual missing information, not generic or false gaps"
    tags: [multi_session, memory, introspection, stretch_goal]
    priority: low
    rubric: memory-introspection

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-seed-partial
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Quick facts: company is Acme Co, my CRM is HubSpot, assistant is Sarah. We ship from Reno."

      - id: s2-probe
        time_offset: "72h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "What information about me or my business would be useful for you to have, that you don't currently?"

    expectations:
      expected_behavior: |
        Agent names actual gaps: missing entity type / legal structure, no
        billing or payment info, unknown customer profile, unknown pricing,
        etc. Specific and pointed.
      expected_outcome: resolved
      failure_modes:
        - generic: "I'd love to learn more about your goals!"
        - lists_known: Names things the agent actually does know
        - refusal: Declines to answer
        - dump_request: "Tell me everything about your business"
      tester_note: |
        Most systems will fail this -- it's a stretch goal. But HOW they fail
        is informative. Generic answer = no introspection at all. Listing
        known things = introspection without integrity check. Refusal = at
        least honest. Score the failure modes, don't just pass/fail.

  # =========================================================================
  # Category 11: Long-tail / cold recall
  # =========================================================================

  - id: mem-longtail-lawyer-recall
    name: "Long-tail: single passing mention surfaces weeks later in a new context"
    description: "Fact mentioned once, in passing, retrieved much later when relevant"
    tags: [multi_session, memory, long_tail]
    priority: high
    rubric: memory-hygiene

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-passing-mention
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Draft a contractor agreement for Devon Okafor, marketing site redesign, $120/hr, 3 month engagement. Our lawyer is Pat Nguyen at Hartwell & Co, pat@hartwellco.legal -- I'll have her review before I sign so make the draft clean. Use standard terms."

      - id: s2-filler-one
        time_offset: "120h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            content: "Log 4 expenses to the April sheet: Adobe $54.99, AWS $312.40, Zoom $14.99, Notion $10.00. Categories are Software for all."

      - id: s3-filler-two
        time_offset: "168h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            content: "Research GreenBuild Studios at greenbuildstudios.com and draft a partnership outreach email to their team."

      - id: s4-filler-three
        time_offset: "120h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            content: "Post a tweet announcing we just hit 100 customers. Celebratory tone, relevant hashtags."

      - id: s5-probe
        time_offset: "960h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Loop in our lawyer on this -- I need them to review the attached supplier agreement before I sign."
            attachments:
              - path: fixtures/supplier-agreement.pdf.txt
                name: supplier-agreement.pdf

    expectations:
      expected_behavior: |
        Agent identifies Pat Nguyen at Hartwell & Co, pat@hartwellco.legal,
        drafts an email or handles the loop-in correctly. No clarifying
        questions about who the lawyer is.
      expected_outcome: resolved
      failure_modes:
        - cold_recall_fail: Asks who the lawyer is
        - no_record: Says it has no record of a lawyer
        - fabrication: Invents a different lawyer name
      tester_note: |
        Systems with recency-weighted retrieval will systematically fail
        this. Consider running multiple variants at different time offsets
        (1 week, 1 month, 2 months) to map the decay curve -- the SHAPE is
        more diagnostic than a single pass/fail.

  # =========================================================================
  # Category 12: Memory hygiene and decay
  # =========================================================================

  - id: mem-hygiene-bounded-time
    name: "Hygiene: bounded-time constraint correctly expires"
    description: "Temporary constraint applies during its window and not after"
    tags: [multi_session, memory, hygiene, decay]
    priority: medium
    rubric: memory-hygiene

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-set-constraint
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "I'm in heads-down mode this week -- no meetings, no calls, push everything to next week at the earliest."

      - id: s2-during-window
        time_offset: "24h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "A prospect at rachel@greenbuildstudios.com just emailed asking for a 30-minute call this week to discuss our consulting services. Draft a reply."

      - id: s3-after-window
        time_offset: "216h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "A different prospect at david@novatech.io wants a call this week to discuss our Growth plan. Draft a reply."

    expectations:
      expected_behavior: |
        S2: Reply pushes the call to next week, reflecting the "heads-down"
        constraint.
        S3: Reply offers a call this week normally, or proposes standard
        scheduling options. The "heads-down" constraint has expired and
        should not apply.
      expected_outcome: resolved
      failure_modes:
        - s2_ignored: S2 reply offers a meeting this week anyway
        - s3_persisted: S3 reply still pushes to next week citing or reflecting the stale constraint
        - both_behaviors_wrong: Fails both -- probably a deeper bug
      tester_note: |
        "This week" is a fuzzy time bound. A strict system may pass S2 and
        fail S3 because it doesn't know when "this week" ends. For v1 of
        testing, consider a parallel scenario that uses explicit dates
        ("no meetings until Friday April 10"). The natural-language version
        is the better test but the explicit version is the more gradeable one.

  - id: mem-hygiene-temporary-status
    name: "Hygiene: temporary stockout status correctly expires"
    description: "Temporary status fact does not persist beyond its expected expiry"
    tags: [multi_session, memory, hygiene, decay]
    priority: medium
    rubric: memory-hygiene

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-set-status
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Heads up: we're temporarily out of stock on the Premium Blend 5lb -- should be back in stock by April 15. If any customer asks, let them know."

      - id: s2-during-stockout
        time_offset: "120h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "A customer just emailed asking about Premium Blend 5lb availability -- they want to place a 10-unit order. Draft a reply."

      - id: s3-after-stockout
        time_offset: "720h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "A customer just emailed asking about Premium Blend 5lb availability -- they want a 10-unit order. Draft a reply."

    expectations:
      expected_behavior: |
        S2: Reply mentions the temporary stockout and the expected return
        date (April 15).
        S3: Reply does not mention the stockout. Ideally checks a live
        source of truth for current stock; at minimum, does not assume the
        stockout from S1 still applies.
      expected_outcome: resolved
      failure_modes:
        - s2_missing: S2 doesn't mention the stockout (didn't use known info)
        - s3_persisted: S3 tells the customer it's out of stock, using stale info
        - s3_stale_date: S3 cites the April 15 return date as still upcoming
      tester_note: |
        The "right" architecture here may be "agent checks source of truth"
        rather than "memory decays correctly." If your architecture supports
        live inventory checks, the test becomes whether the agent knows to
        verify rather than whether the memory aged out. Two valid approaches,
        pick which you're testing and grade accordingly.

  # =========================================================================
  # Category 13: Negative tests
  # =========================================================================

  - id: mem-negative-one-off-qualifier
    name: "Negative: one-off qualifier is not stored as standing preference"
    description: "A 'just for this one' instruction does not become a default"
    tags: [multi_session, memory, negative, anti_rigidity]
    priority: high
    rubric: memory-abstention

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-one-off
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Draft a quick email to one of our board members about Q1 results. Just for this one, use a more formal tone than usual -- board members expect that level of formality."

      - id: s2-probe
        time_offset: "72h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Draft an outreach email to a new prospect at rachel@greenbuildstudios.com about our consulting services."

    expectations:
      expected_behavior: |
        Default / standard tone, not formal. Agent did not generalize the
        one-off formality qualifier into a standing preference.
      expected_outcome: resolved
      failure_modes:
        - overgeneralized: Uses formal tone for the prospect email
        - exposed: Explicitly says "I'm using a formal tone like you prefer"
        - partial: Writes somewhere between formal and casual, split-the-difference

  - id: mem-negative-forget-on-request
    name: "Negative: explicit forget command clears the fact"
    description: "When the user says 'forget that,' the fact does not resurface"
    tags: [multi_session, memory, negative]
    priority: high
    rubric: memory-abstention

    context:
      system_prompt: "You are AutoGPT, an autonomous AI agent helping SMB founders automate operations."

    sessions:
      - id: s1-teach
        time_offset: "0h"
        reset: none
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Quick planning note: our budget for the Q2 marketing push is $50K. Help me sketch out how to allocate it across channels."

      - id: s2-forget
        time_offset: "48h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "Actually, scratch what I said about the Q2 marketing budget. I don't want that number floating around in your memory. Forget it."

      - id: s3-probe
        time_offset: "120h"
        reset: fresh_agent
        max_turns: 1
        turns:
          - role: user
            use_exact_message: true
            content: "What's our Q2 marketing budget?"

    expectations:
      expected_behavior: |
        Agent says it doesn't have that information on file, or explicitly
        says it was asked to forget the budget. Does NOT return "$50K."
      expected_outcome: resolved
      failure_modes:
        - forget_ignored: Returns $50K
        - forget_acknowledged_but_leaked: Returns $50K with a note that it was asked to forget (proves forget didn't clear storage -- worst failure)
        - fabrication: Returns a different number
      tester_note: |
        This partly tests whether the system CAN honor forget requests at
        all. Vector stores in particular have no native "delete this fact"
        semantic -- they have "delete this chunk" which may or may not
        contain the fact. Document the architecture's actual capability
        before running and distinguish "can't" from "didn't."
