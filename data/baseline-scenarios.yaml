    description: "Act as my operations assistant: draft next week's content calendar (5 LinkedIn posts, 3 blog outlines, 2 newsletter drafts) in my brand voice based on last month's top-performing p"
    tags:
      - tasks-100
      - founder-operations-multi-function-ai-assistant
    persona: founder-operator
    rubric: operations-automation
    turns:
      - role: user
        content: |-
          Act as my operations assistant: draft next week's content calendar (5 LinkedIn posts, 3 blog outlines, 2 newsletter drafts) in my brand voice based on last month's top-performing posts, then draft 10 replies to pending customer support tickets in the inbox CSV I'll provide.

          Context:
          {
            "persona": "You're assistant to Maya Chen, founder/CEO of Harbor Analytics — a 12-person B2B SaaS selling supply-chain visibility to mid-market manufacturers ($6M ARR).",
            "brand_voice": "Plainspoken, numbers-first, no jargon. Sample tone from her past LinkedIn posts: https://www.linkedin.com/company/harbor-analytics/posts",
            "top_performing_posts_source": "Pull tone from https://buffer.com/resources (our team's prior social lead worked there). Our own 3 best posts: attached in fixtures/top_posts.json with engagement metrics.",
            "fixtures": {
              "top_posts.json": "3 posts with body, engagement (likes, comments, CTR)",
              "pending_tickets.csv": "10 open support tickets with columns: ticket_id, customer, subject, body, priority, received_at",
              "last_month_analytics.json": "post-level engagement for prior month"
            },
            "outputs_required": "5 LinkedIn post drafts, 3 blog outlines (title + 5-bullet structure), 2 newsletter drafts (subject + preheader + body), 10 ticket replies."
          }
    expectations:
      expected_behavior: Address the user's request end-to-end, producing the artifacts or actions described. Do not fabricate tool outputs, data, or completed actions. Ask clarifying questions only when strictly necessary.
      expected_outcome: resolved
