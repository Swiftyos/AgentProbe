name: Build & Deploy

# Builds the AgentProbe container image, pushes it to Google Artifact Registry,
# and rolls out infra/k8s/manifest.yaml against a GKE cluster.
#
# This workflow is **opt-in**. It does nothing on a fresh fork until the GitHub
# Environment variables below are configured.
#
# Setup
# =====
# Create a GitHub Environment named "dev" at Settings → Environments and set
# the variables below on it. Pushes to `main` auto-deploy to dev. A "prod"
# environment can be added later and targeted manually via workflow_dispatch.
#
# Required:
#   GCP_PROJECT_ID                  e.g. my-project
#   GCP_REGION                      e.g. us-east1
#   GCP_ARTIFACT_REPOSITORY         e.g. agentprobe
#   GCP_WORKLOAD_IDENTITY_PROVIDER  full provider resource name
#   GCP_DEPLOY_SERVICE_ACCOUNT      SA email impersonated via WIF
#   GKE_CLUSTER                     cluster name
#   GKE_LOCATION                    cluster zone or region
#   K8S_NAMESPACE                   target namespace (created if missing)
#   GSA_EMAIL                       Workload Identity GSA email bound to the
#                                   in-cluster ServiceAccount (used by the
#                                   Cloud SQL Proxy sidecar to authenticate)
#   CLOUD_SQL_INSTANCE              project:region:instance string
#
# Optional:
#   IMAGE_NAME      defaults to "agentprobe"
#   DEPLOY_BRANCH   branch that auto-deploys; defaults to "main"
#
# No secrets are required by the workflow itself; runtime secrets such as
# AGENTPROBE_SERVER_TOKEN, OPEN_ROUTER_API_KEY, AGENTPROBE_DB_URL, and
# AGENTPROBE_ENCRYPTION_KEY must already exist in a Kubernetes Secret named
# "evals-secrets" in the target namespace (see infra/README.md).

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "dashboard/**"
      - "data/**"
      - "Dockerfile"
      - "package.json"
      - "bun.lock"
      - "infra/k8s/**"
      - ".github/workflows/build-deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment (must match a GitHub Environment name)"
        required: false
        default: "dev"
        type: choice
        options: [dev, prod]

concurrency:
  group: build-deploy-${{ inputs.environment || 'dev' }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    outputs:
      configured: ${{ steps.check.outputs.configured }}
      image: ${{ steps.check.outputs.image }}
      deploy_branch: ${{ steps.check.outputs.deploy_branch }}
    steps:
      - name: Verify deploy configuration
        id: check
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_ARTIFACT_REPOSITORY: ${{ vars.GCP_ARTIFACT_REPOSITORY }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_DEPLOY_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
          GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
          GKE_LOCATION: ${{ vars.GKE_LOCATION }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          GSA_EMAIL: ${{ vars.GSA_EMAIL }}
          CLOUD_SQL_INSTANCE: ${{ vars.CLOUD_SQL_INSTANCE }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH }}
        run: |
          set -euo pipefail
          missing=()
          for var in GCP_PROJECT_ID GCP_REGION GCP_ARTIFACT_REPOSITORY \
                    GCP_WORKLOAD_IDENTITY_PROVIDER GCP_DEPLOY_SERVICE_ACCOUNT \
                    GKE_CLUSTER GKE_LOCATION K8S_NAMESPACE \
                    GSA_EMAIL CLOUD_SQL_INSTANCE; do
            if [[ -z "${!var:-}" ]]; then
              missing+=("$var")
            fi
          done

          deploy_branch="${DEPLOY_BRANCH:-main}"
          echo "deploy_branch=$deploy_branch" >> "$GITHUB_OUTPUT"

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::warning::Skipping build/deploy. Missing variables in environment '${{ inputs.environment || 'dev' }}': ${missing[*]}"
            echo "::warning::See .github/workflows/build-deploy.yml header for setup instructions."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          image_name="${IMAGE_NAME:-agentprobe}"
          image="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REPOSITORY}/${image_name}"

          echo "configured=true" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: preflight
    if: needs.preflight.outputs.configured == 'true' && (github.event_name == 'workflow_dispatch' || github.ref_name == needs.preflight.outputs.deploy_branch)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute build metadata
        id: meta
        run: |
          short_sha=$(git rev-parse --short HEAD)
          echo "sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "image=${{ needs.preflight.outputs.image }}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
          token_format: access_token
          create_credentials_file: true

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha,scope=evals-${{ inputs.environment || 'dev' }}
          cache-to: type=gha,scope=evals-${{ inputs.environment || 'dev' }},mode=max

  deploy:
    needs: [preflight, build-and-push]
    if: needs.preflight.outputs.configured == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location: ${{ vars.GKE_LOCATION }}

      - name: Ensure namespace exists
        run: |
          kubectl get namespace "${{ vars.K8S_NAMESPACE }}" >/dev/null 2>&1 \
            || kubectl create namespace "${{ vars.K8S_NAMESPACE }}"

      - name: Apply manifest
        env:
          NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          GSA_EMAIL: ${{ vars.GSA_EMAIL }}
          CLOUD_SQL_INSTANCE: ${{ vars.CLOUD_SQL_INSTANCE }}
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          TAG: ${{ needs.build-and-push.outputs.sha }}
        run: |
          set -euo pipefail
          envsubst < infra/k8s/manifest.yaml | tee /tmp/rendered.yaml
          kubectl apply -f /tmp/rendered.yaml

      - name: Wait for rollout
        run: |
          kubectl --namespace "${{ vars.K8S_NAMESPACE }}" rollout status \
            deployment/evals --timeout=5m
