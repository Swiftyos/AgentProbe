# AgentProbe evals deployment.
#
# Placeholders are filled in at deploy time by the build-deploy workflow
# (see .github/workflows/build-deploy.yml). For local apply, run:
#
#   IMAGE=...    TAG=...    NAMESPACE=dev-agpt \
#   GSA_EMAIL=...    CLOUD_SQL_INSTANCE=project:region:instance \
#   envsubst < infra/k8s/manifest.yaml | kubectl apply -f -
#
# Required out-of-band setup:
#   - kubectl create namespace ${NAMESPACE}
#   - kubectl create secret generic evals-secrets -n ${NAMESPACE} \
#       --from-literal=OPEN_ROUTER_API_KEY=...
#       --from-literal=AGENTPROBE_DB_URL='postgresql://USER:PASS@127.0.0.1:5432/DB'
#       --from-literal=AGENTPROBE_ENCRYPTION_KEY=...
#
# Pod layout (Kubernetes 1.29+ native sidecar):
#   initContainers:
#     1. cloud-sql-proxy  — restartPolicy: Always (native sidecar, stays
#                          running for the lifetime of the pod)
#     2. db-migrate       — runs `db:migrate` against Postgres via the
#                          proxy on 127.0.0.1:5432 and exits
#   containers:
#     - evals             — the API/UI server
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: evals
  namespace: ${NAMESPACE}
  annotations:
    iam.gke.io/gcp-service-account: ${GSA_EMAIL}
---
apiVersion: v1
kind: Service
metadata:
  name: evals
  namespace: ${NAMESPACE}
  labels:
    app: evals
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 7878
      targetPort: http
      protocol: TCP
  selector:
    app: evals
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: evals
  namespace: ${NAMESPACE}
  labels:
    app: evals
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: evals
  template:
    metadata:
      labels:
        app: evals
    spec:
      serviceAccountName: evals
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.15.2
          # Native sidecar (k8s 1.29+): runs alongside subsequent init
          # containers and the main container, stays up for the pod's life.
          restartPolicy: Always
          args:
            - "--structured-logs"
            - "--port=5432"
            # The platform Cloud SQL instances (dev-agpt, prod-agpt) are
            # private-IP only — the proxy's default public IP path returns
            # "instance does not have IP of type PUBLIC".
            - "--private-ip"
            # Bind the HTTP health endpoints on 0.0.0.0 so kubelet can reach
            # them via the pod IP (the SQL listener stays on loopback only).
            - "--http-address=0.0.0.0"
            - "--http-port=9090"
            - "--health-check"
            - "${CLOUD_SQL_INSTANCE}"
          startupProbe:
            httpGet:
              path: /startup
              port: 9090
            periodSeconds: 2
            failureThreshold: 30
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
        - name: db-migrate
          image: ${IMAGE}:${TAG}
          imagePullPolicy: IfNotPresent
          command: ["bun", "run", "./src/cli/main.ts", "db:migrate"]
          envFrom:
            - secretRef:
                name: evals-secrets
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      containers:
        - name: evals
          image: ${IMAGE}:${TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7878
              protocol: TCP
          env:
            - name: AGENTPROBE_SERVER_HOST
              value: "0.0.0.0"
            - name: AGENTPROBE_SERVER_PORT
              value: "7878"
            - name: AGENTPROBE_SERVER_LOG_FORMAT
              value: "json"
          envFrom:
            - secretRef:
                name: evals-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
